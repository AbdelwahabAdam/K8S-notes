<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bing Bong - Master/Slave</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #333; text-align: center; margin-bottom: 20px; }
        .status-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            justify-content: space-around;
            margin-bottom: 20px;
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status {
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
        }
        .status-connected { background: #d4edda; color: #155724; }
        .status-disconnected { background: #f8d7da; color: #721c24; }
        .status-unknown { background: #e2e3e5; color: #383d41; }
        .node-type {
            padding: 4px 12px;
            border-radius: 20px;
            background: #007bff;
            color: white;
            font-weight: bold;
        }
        .messages-container {
            height: 400px;
            overflow-y: auto;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 15px;
            background: #fafafa;
            margin-bottom: 20px;
        }
        .message {
            padding: 10px 15px;
            margin-bottom: 8px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .message-master { background: #e3f2fd; border-left: 4px solid #2196f3; }
        .message-slave { background: #f3e5f5; border-left: 4px solid #9c27b0; }
        .message.empty { background: transparent; border: none; color: #999; font-style: italic; justify-content: center; }
        .time { color: #666; font-size: 0.8em; min-width: 80px; }
        .emoji { font-size: 1.2em; }
        .from { font-weight: bold; min-width: 60px; }
        .msg { font-weight: 500; }
        .controls { display: flex; gap: 10px; justify-content: center; }
        .controls button {
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .controls .btn-clear { background: #dc3545; color: white; }
        .controls .btn-refresh { background: #007bff; color: white; }
        .controls button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #888; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 Bing Bong Master-Slave</h1>
        <div class="status-bar">
            <div class="status-item">
                <span class="label">Node:</span>
                <span id="node-type" class="node-type">Loading...</span>
            </div>
            <div class="status-item">
                <span class="label">Peer Status:</span>
                <span id="peer-status" class="status status-unknown">⏳ Checking...</span>
            </div>
            <div class="status-item">
                <span class="label">Total Messages:</span>
                <span id="total-messages">0</span>
            </div>
        </div>
        <div class="messages-container" id="messages">
            <div class="message empty">Waiting for messages...</div>
        </div>
        <div class="controls">
            <button class="btn-clear" onclick="clearMessages()">🗑️ Clear</button>
            <button class="btn-refresh" onclick="refreshData()">🔄 Refresh</button>
        </div>
    </div>
    <script>
        function fetchMessages() {
            fetch('/api/messages')
                .then(response => response.json())
                .then(messages => {
                    const container = document.getElementById('messages');
                    if (messages.length === 0) {
                        container.innerHTML = '<div class="message empty">No messages yet...</div>';
                        return;
                    }
                    let html = '';
                    messages.forEach(msg => {
                        const time = new Date(msg.timestamp).toLocaleTimeString();
                        const isMaster = msg.from === 'Master';
                        const messageClass = isMaster ? 'message-master' : 'message-slave';
                        const emoji = isMaster ? '📤' : '📨';
                        html += `<div class="message ${messageClass}">
                            <span class="time">${time}</span>
                            <span class="emoji">${emoji}</span>
                            <span class="from">${msg.from}:</span>
                            <span class="msg">${msg.message}</span>
                        </div>`;
                    });
                    container.innerHTML = html;
                    container.scrollTop = container.scrollHeight;
                })
                .catch(error => console.error('Error:', error));
        }

        function fetchStatus() {
            fetch('/api/status')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('node-type').textContent = data.node_type;
                    document.getElementById('total-messages').textContent = data.total_messages || 0;
                    const isConnected = data.node_type === 'Master' ? data.slave_available : data.master_available;
                    const statusEl = document.getElementById('peer-status');
                    if (isConnected) {
                        statusEl.textContent = '✅ Connected';
                        statusEl.className = 'status status-connected';
                    } else {
                        statusEl.textContent = '❌ Disconnected';
                        statusEl.className = 'status status-disconnected';
                    }
                })
                .catch(error => console.error('Error:', error));
        }

        function clearMessages() {
            if (confirm('Clear all messages?')) {
                fetch('/api/clear', { method: 'POST' })
                    .then(() => {
                        document.getElementById('messages').innerHTML = '<div class="message empty">Messages cleared</div>';
                    })
                    .catch(error => console.error('Error:', error));
            }
        }

        function refreshData() {
            fetchMessages();
            fetchStatus();
        }

        setInterval(fetchMessages, 2000);
        setInterval(fetchStatus, 2000);
        fetchMessages();
        fetchStatus();
    </script>
</body>
</html>
