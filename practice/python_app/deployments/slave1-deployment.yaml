apiVersion: apps/v1
kind: Deployment
metadata:
  name: slave1-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: slave1

  template:
    metadata:
      labels:
        app: slave1
    spec:
      containers:
        - name: slave1
          image: slave1
          env:
            - name: SLAVE_NAME
              value: Slave1


